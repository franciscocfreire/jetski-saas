name: CD (deploy produção)

# Deploy contínuo no servidor Oracle Cloud (ARM) via SSH.
# Dispara automaticamente em push na main APÓS o CI passar, ou manualmente.
# O build das imagens é feito NO servidor (ARM nativo) pelo deploy.sh — não há
# registry/cross-compile. O job apenas conecta por SSH, faz git pull e roda o deploy.
#
# Segredos necessários (Settings → Secrets and variables → Actions):
#   SSH_HOST        IP/host do servidor (ex: 64.181.176.180)
#   SSH_USER        usuário SSH (ex: ubuntu)
#   SSH_PRIVATE_KEY conteúdo da chave privada (a mesma usada localmente)
#   DEPLOY_PATH     caminho do repo no servidor (ex: /home/ubuntu/jetski)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Pular rebuild de imagens (só migrations/restart)"
        type: boolean
        default: false

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    # Só roda se o CI passou (ou se acionado manualmente)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      # Setup manual da chave (sem webfactory/ssh-agent: evita o ruído de cleanup
      # "Error stopping the SSH agent" e o aviso de Node 20 no runner).
      - name: Configurar SSH (chave + known_hosts)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # Comando remoto numa única string (sem `bash -lc` aninhado, que fazia o ssh
      # reconcatenar e o shell remoto perder o argumento do -c → "bash: -c: option
      # requires an argument"). $DEPLOY_PATH/$SKIP expandem aqui antes de enviar.
      - name: Deploy (git reset + deploy.sh no servidor)
        env:
          SKIP: ${{ inputs.skip_build && '1' || '0' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_deploy "$SSH_USER@$SSH_HOST" \
            "set -e; cd '$DEPLOY_PATH'; git fetch origin main; git reset --hard origin/main; NO_PULL=1 NO_BUILD=$SKIP ./deploy.sh"
