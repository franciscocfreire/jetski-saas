name: CI

# Integração contínua: roda a suíte de testes a cada push/PR na main.
# NÃO faz deploy — apenas valida que código, schema (Flyway) e fronteiras de
# módulos (ModuleStructureTest) continuam consistentes. Roda nos runners da
# GitHub (ubuntu-latest, com Docker p/ Testcontainers); não toca no ambiente local.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancela runs antigas do mesmo branch/PR quando há push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — testes + fronteiras de módulos
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin) + cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Roda unit + integração (Testcontainers/PostgreSQL) + ModuleStructureTest.
      # Docker já vem disponível no runner ubuntu-latest.
      - name: mvn clean test
        run: mvn -B clean test

      # Imprime no log os relatórios das classes que falharam (stack trace real),
      # já que o resumo do surefire no console não mostra a causa (só o artefato).
      - name: Stack traces das falhas (no log)
        if: failure()
        working-directory: backend
        run: |
          shopt -s nullglob
          for f in target/surefire-reports/*.txt; do
            if grep -qE "<<< (FAILURE|ERROR)|Tests run: [0-9]+, Failures: [1-9]|Errors: [1-9]" "$f"; then
              echo "::group::$f"
              cat "$f"
              echo "::endgroup::"
            fi
          done

      - name: Publicar relatórios de teste (mesmo em falha)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # Testa as políticas de autorização (OPA/Rego). Os testes Java mockam o OPA, então
  # furos de política (ex.: platform:* acessível por wildcard) só aparecem aqui.
  policies:
    name: Políticas OPA — opa test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: opa test ./policies
        run: |
          docker run --rm -v "${{ github.workspace }}/policies:/policies" \
            openpolicyagent/opa:1.1.0 test /policies -v
