# Prometheus de PRODUÇÃO — raspa pelo nome de serviço na rede do app
# (nada de IP de host: o stack entra na jetski-network externa).

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    environment: prod

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'jetski-backend'
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ['backend:8090']
        labels:
          application: jetski-api

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana'
    metrics_path: /grafana/metrics
    static_configs:
      - targets: ['grafana:3000']
