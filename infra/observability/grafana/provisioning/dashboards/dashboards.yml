# Provider de dashboards de PRODUÇÃO — os JSONs são os mesmos de
# infra/monitoring (montados em /var/lib/grafana/dashboards pelo compose).

apiVersion: 1

providers:
  - name: 'Jetski Dashboards'
    orgId: 1
    folder: 'Jetski SaaS'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
