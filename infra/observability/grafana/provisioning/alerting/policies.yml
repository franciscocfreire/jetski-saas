# Política de notificação: tudo para o e-mail de ops, reagrupado por alerta,
# reenvio a cada 4h enquanto o problema persistir.

apiVersion: 1

policies:
  - orgId: 1
    receiver: email-ops
    group_by: ['grafana_folder', 'alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
