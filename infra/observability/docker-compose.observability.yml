# =============================================================================
# Observabilidade de PRODUÇÃO (enxuta) — Grafana + Loki + Promtail + Prometheus
#
# Uso (no servidor, a partir da raiz do repo):
#   docker compose -f infra/observability/docker-compose.observability.yml up -d
#
# Desenho:
# - Promtail lê os LOGS DE TODOS os containers direto do Docker (socket +
#   /var/lib/docker/containers) → Loki. Nada de arquivos de log da app:
#   funciona para backend, nginx, keycloak, portal etc. sem tocar em ninguém.
#   (Em dev/WSL2 + Docker Desktop isso NÃO funciona — os logs ficam na VM;
#   use `docker compose logs` em dev, este stack é para o servidor Linux.)
# - Prometheus raspa o backend pelo nome de serviço (rede do app, externa).
# - Grafana atrás do nginx em ${PUBLIC_URL}/grafana (login próprio; senha
#   admin vem do .env — GRAFANA_ADMIN_PASSWORD).
# - Sem Jaeger/Alertmanager na v1 (memória curta no servidor; adicionar
#   depois se precisar de tracing/alertas).
# - Portas só em 127.0.0.1 (ingress público é o tunnel → nginx).
# - Retenção: Loki 7d (loki-config), Prometheus 7d (flag abaixo).
#
# Requisito: a rede do app já existe (stack principal no ar). Se o projeto
# compose tiver outro nome, ajuste JETSKI_APP_NETWORK no .env.
# =============================================================================
services:
  loki:
    image: grafana/loki:2.9.2
    container_name: jetski-loki
    restart: unless-stopped
    user: root
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 512m
    networks:
      - app

  promtail:
    image: grafana/promtail:2.9.2
    container_name: jetski-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-prod.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/positions
    command: -config.file=/etc/promtail/config.yml
    mem_limit: 256m
    networks:
      - app
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: jetski-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    mem_limit: 512m
    networks:
      - app

  # Métricas do HOST (CPU/RAM/disco/rede) — o que enxerga os 11 GB acabando
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: jetski-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    mem_limit: 64m
    networks:
      - app

  # Métricas POR CONTAINER (memória/CPU de backend, keycloak, portal…)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: jetski-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      # enxuto: só memória/CPU/rede por container. "disk" desabilitado também
      # por compatibilidade: com o containerd image store (storage driver
      # "overlayfs"), o cAdvisor não acha a camada rw no layout antigo
      # (/var/lib/docker/image/...) e falha ao registrar TODOS os containers
      # ("failed to identify the read-write layer ID") — sem disk, ele pula
      # essa consulta e as métricas de memória/CPU voltam.
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--store_container_labels=false'
      - '--disable_metrics=disk,diskIO,percpu,sched,tcp,udp,process,hugetlb,referenced_memory,cpu_topology,resctrl,memory_numa,cpuset,advtcp'
    mem_limit: 256m
    networks:
      - app

  grafana:
    image: grafana/grafana:10.1.5
    container_name: jetski-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3300:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?defina GRAFANA_ADMIN_PASSWORD no .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # atrás do nginx em /grafana (mesmo host público do app)
      GF_SERVER_ROOT_URL: ${PUBLIC_URL:-http://localhost:3300}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Alertas por e-mail — reaproveita o Gmail do backend (.env)
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-true}
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${GMAIL_USER:-}
      GF_SMTP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GMAIL_USER:-grafana@localhost}
      GF_SMTP_FROM_NAME: Grafana Meu Jet
      # destinatário dos alertas (usado pelo provisioning de alerting)
      GRAFANA_ALERT_EMAIL: ${GRAFANA_ALERT_EMAIL:-${GMAIL_USER:-ops@localhost}}
    volumes:
      # provisioning próprio de prod (datasources sem Jaeger) + dashboards
      # compartilhados com o stack de dev
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    mem_limit: 320m
    networks:
      - app
    depends_on:
      - prometheus
      - loki

networks:
  app:
    external: true
    name: ${JETSKI_APP_NETWORK:-jetski_jetski-network}

volumes:
  loki-data:
  promtail-positions:
  prometheus-data:
  grafana-data:
