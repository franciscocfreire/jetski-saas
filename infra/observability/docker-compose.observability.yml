# =============================================================================
# Observabilidade (DEV = PROD) — Grafana + Loki + Alloy + Prometheus + exporters
#
# Uso (raiz do repo, no servidor OU no dev/WSL2 — mesmo stack nos dois):
#   docker compose --env-file .env -f infra/observability/docker-compose.observability.yml up -d
#
# Desenho:
# - Alloy coleta os LOGS DE TODOS os containers do compose via API DO DOCKER
#   (docker.sock) → Loki. Funciona igualmente em prod e em dev/WSL2 + Docker
#   Desktop (o Promtail antigo lia /var/lib/docker e só funcionava em prod).
# - Prometheus raspa backend/node-exporter/telegraf pelo nome de serviço
#   (rede do app, externa).
# - Grafana atrás do nginx em ${PUBLIC_URL}/grafana (login próprio; senha
#   admin vem do .env — GRAFANA_ADMIN_PASSWORD). Alertas por e-mail (em dev,
#   aponte GRAFANA_SMTP_HOST=mailpit:1025 p/ ver os alertas no Mailpit).
# - Sem Jaeger (tracing) nesta versão.
# - Portas só em 127.0.0.1 (ingress público é o tunnel → nginx).
# - Retenção: Loki 7d (loki-config), Prometheus 7d (flag abaixo).
#
# Requisito: a rede do app já existe (stack principal no ar). Se o projeto
# compose tiver outro nome, ajuste JETSKI_APP_NETWORK no .env.
# =============================================================================
services:
  loki:
    image: grafana/loki:2.9.2
    container_name: jetski-loki
    restart: unless-stopped
    user: root
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 512m
    networks:
      - app

  alloy:
    image: grafana/alloy:v1.4.2
    container_name: jetski-alloy
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    mem_limit: 256m
    networks:
      - app
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: jetski-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    mem_limit: 512m
    networks:
      - app

  # Métricas do HOST (CPU/RAM/disco/rede) — o que enxerga os 11 GB acabando
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: jetski-node-exporter
    restart: unless-stopped
    pid: host
    command:
      - '--path.rootfs=/host'
    volumes:
      # sem rslave: Docker Desktop (dev/WSL2) não suporta propagação shared;
      # o custo é só não enxergar montagens feitas APÓS o start — ok p/ nós
      - /:/host:ro
    mem_limit: 64m
    networks:
      - app

  # Métricas POR CONTAINER (memória/CPU de backend, keycloak, portal…) via
  # API do Docker. Substitui o cAdvisor, que não funciona com o containerd
  # image store do Docker moderno (google/cadvisor#3643, closed-not-planned):
  # falhava ao registrar todos os containers ("read-write layer ID").
  telegraf:
    image: telegraf:1.31
    container_name: jetski-telegraf
    restart: unless-stopped
    # o entrypoint da imagem derruba para o usuário "telegraf", que não lê o
    # docker.sock (gid do grupo docker varia por host) — invocamos direto
    user: root
    entrypoint: ["telegraf"]
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 192m
    networks:
      - app

  grafana:
    image: grafana/grafana:10.1.5
    container_name: jetski-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3300:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?defina GRAFANA_ADMIN_PASSWORD no .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # atrás do nginx em /grafana (mesmo host público do app)
      GF_SERVER_ROOT_URL: ${PUBLIC_URL:-http://localhost:3300}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Alertas por e-mail — reaproveita o Gmail do backend (.env)
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-true}
      GF_SMTP_HOST: ${GRAFANA_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${GMAIL_USER:-}
      GF_SMTP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GMAIL_USER:-grafana@localhost}
      GF_SMTP_FROM_NAME: Grafana Meu Jet
      # destinatário dos alertas (usado pelo provisioning de alerting)
      GRAFANA_ALERT_EMAIL: ${GRAFANA_ALERT_EMAIL:-${GMAIL_USER:-ops@localhost}}
    volumes:
      # provisioning (datasources/alerting) + dashboards JSON
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    mem_limit: 320m
    networks:
      - app
    depends_on:
      - prometheus
      - loki

networks:
  app:
    external: true
    name: ${JETSKI_APP_NETWORK:-jetski_jetski-network}

volumes:
  loki-data:
  alloy-data:
  prometheus-data:
  grafana-data:
