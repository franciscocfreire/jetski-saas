# Telegraf — métricas por container via API do Docker (substitui o cAdvisor,
# que não suporta o containerd image store do Docker moderno: google/cadvisor#3643).
# Lê o docker.sock, então funciona independente do storage driver.

[agent]
  interval = "30s"
  flush_interval = "30s"
  omit_hostname = true

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  timeout = "10s"
  # só o total de CPU (sem per-core) e sem per-device de disco
  perdevice = false
  total = true
  # labels do container virariam tags/labels no Prometheus (com.docker.compose.*
  # em todo container do compose) — cardinalidade inútil, o container_name basta
  docker_label_exclude = ["*"]
  # tags voláteis: container_id/versão mudam a cada recreate (todo deploy!) e
  # criariam uma série nova por deploy — com elas fora, o container recriado
  # continua a MESMA série e não aparece duplicado nos painéis
  tagexclude = ["container_id", "container_image", "container_version",
                "container_status", "engine_host", "server_version"]
  # container_id também existe como FIELD string (vira label no Prometheus)
  fieldexclude = ["container_id"]

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
  # sem métricas internas do processo Go do próprio Telegraf
  collectors_exclude = ["gocollector", "process"]
  expiration_interval = "3m"

# ------------------------------------------------------------------
# Saúde das dependências internas (P1 do lançamento): TCP check nos
# serviços de estado — o Prometheus só raspava o backend; postgres/
# keycloak/redis/opa caídos só apareciam indiretamente.
# result_code: 0 = ok; >0 = falha (alerta "Dependência interna fora do ar").
[[inputs.net_response]]
  protocol = "tcp"
  address = "postgres:5432"
  timeout = "5s"

[[inputs.net_response]]
  protocol = "tcp"
  address = "redis:6379"
  timeout = "5s"

[[inputs.net_response]]
  protocol = "tcp"
  address = "keycloak:8080"
  timeout = "5s"

[[inputs.net_response]]
  protocol = "tcp"
  address = "opa:8181"
  timeout = "5s"

# Backup diário: idade do marcador last-success (montado pelo compose;
# em dev o arquivo não existe → alerta configurado com noDataState: OK).
[[inputs.filestat]]
  files = ["/host/backups/last-success"]
