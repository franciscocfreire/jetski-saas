events {
    worker_connections 1024;
}

http {
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # DNS resolver do Docker
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer sizes for proxy
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Large header/cookie support (JWT tokens can be large)
    large_client_header_buffers 4 64k;
    client_header_buffer_size 64k;

    # Default máximo de corpo: uploads via /api/ são fotos em base64 (JSON) —
    # comprovante de GRU, anexos de cliente, assinaturas. O default do nginx (1m)
    # rejeitava uma foto de celular com 413, e no mobile o request TRAVA em
    # "enviando…" (a conexão é fechada no meio). 32m cobre com folga; blocos
    # específicos (ex.: /jetski-docs/ = 64m) continuam sobrescrevendo.
    client_max_body_size 32m;

    # Map to determine the real protocol (ngrok sends X-Forwarded-Proto)
    map $http_x_forwarded_proto $real_scheme {
        default $scheme;
        https https;
        http http;
    }

    # ================== Rate limiting (P1 do lançamento) ==================
    # Chave = IP real do visitante: atrás do Cloudflare Tunnel o $remote_addr é
    # sempre o cloudflared — o IP do cliente vem em CF-Connecting-IP. Chave
    # VAZIA (acesso interno/smoke sem o header) não é limitada pelo nginx.
    # 429 = limite excedido.
    limit_req_status 429;
    # Ações caras/abuso direto: envio de OTP (custa e-mail/WhatsApp)
    limit_req_zone $http_cf_connecting_ip zone=rl_otp:10m rate=10r/m;
    # Auth/cadastro: signup, ativação, magic-link (anti brute-force/spam)
    limit_req_zone $http_cf_connecting_ip zone=rl_auth:10m rate=60r/m;
    # Token do Keycloak: generoso — os refreshes server-side do NextAuth saem
    # todos do IP da VM (via issuer público); estrito demais derruba a todos.
    limit_req_zone $http_cf_connecting_ip zone=rl_token:10m rate=300r/m;
    # Endpoints públicos (marketplace/branding): navegação é bursty
    limit_req_zone $http_cf_connecting_ip zone=rl_publico:10m rate=120r/m;

    # Host do portal do cliente por domínio — usado no 301 do caminho legado
    # www/portal/* → cliente.* (fase 1 do subdomínio próprio).
    map $host $portal_host {
        default              cliente.pegaojet.com.br;
        www.meujet.com.br    cliente.meujet.com.br;
        meujet.com.br        cliente.meujet.com.br;
        www.jetsave.com.br   cliente.jetsave.com.br;
        jetsave.com.br       cliente.jetsave.com.br;
    }

    # Host canônico: o app (e os cookies de sessão/PKCE, que são por host)
    # vive em www. Um fluxo OIDC iniciado no apex morre no callback do www —
    # por isso o apex redireciona tudo para o host canônico.
    server {
        listen 80;
        # apex → www (host-only cookies do NextAuth exigem UM host canônico)
        server_name pegaojet.com.br jetsave.com.br meujet.com.br;
        return 301 https://www.$host$request_uri;
    }

    # ================== Portal do cliente — subdomínio próprio ==================
    # cliente.* serve o portal na RAIZ (basePath vazio). O issuer do Keycloak
    # permanece no host www (validação de issuer única no backend): o login
    # redireciona para www/realms e volta pelo redirect_uri registrado.
    server {
        listen 80;
        server_name cliente.pegaojet.com.br cliente.meujet.com.br cliente.jetsave.com.br;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # NextAuth do PORTAL (no host www este caminho é do backoffice!)
        location /api/auth/ {
            set $portal_upstream http://portal:3000;
            proxy_pass $portal_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Actuator/Swagger nunca pelo edge (mesma regra do server default)
        location /api/actuator/ { return 404; }
        location /api/swagger-ui { return 404; }
        location /api/v3/api-docs { return 404; }

        # OTP do aceite remoto (custa e-mail/WhatsApp) — estrito
        location ~ ^/api/v1/.+/otp {
            limit_req zone=rl_otp burst=5 nodelay;
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Público (disponibilidade/branding) — moderado
        location /api/v1/public/ {
            limit_req zone=rl_publico burst=60 nodelay;
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Backend API (mesma origem — sem CORS)
        location /api/ {
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # MinIO presigned (ver comentários no block default)
        location /jetski-docs/ {
            set $minio_upstream http://minio:9000;
            proxy_pass $minio_upstream;
            proxy_set_header Host $host;
            proxy_set_header Cookie "";
            proxy_set_header Authorization "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            client_max_body_size 64m;
        }

        # Portal na raiz
        location / {
            set $portal_upstream http://portal:3000;
            proxy_pass $portal_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (HMR / streaming)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80 default_server;
        server_name _;

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Next.js Auth API (must come before /api/)
        location /api/auth/ {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Custom logout route (must come before /api/)
        location /api/logout {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Actuator: só o health fica público (uptime checks); métricas e o
        # restante NUNCA pelo edge — o Prometheus raspa o backend direto na
        # rede interna do compose.
        location = /api/actuator/health {
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }
        location /api/actuator/ { return 404; }
        # Swagger/OpenAPI fora do edge (dev acessa direto em localhost:8090)
        location /api/swagger-ui { return 404; }
        location /api/v3/api-docs { return 404; }

        # Signup público + ativação de conta (anti-spam/brute-force)
        location /api/v1/signup/ {
            limit_req zone=rl_auth burst=20 nodelay;
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
        location /api/v1/auth/ {
            limit_req zone=rl_auth burst=20 nodelay;
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Envio/validação de OTP (custa e-mail/WhatsApp) — estrito
        location ~ ^/api/v1/.+/otp {
            limit_req zone=rl_otp burst=5 nodelay;
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Marketplace/branding públicos (sem auth) — moderado
        location /api/v1/public/ {
            limit_req zone=rl_publico burst=60 nodelay;
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Backend API
        location /api/ {
            set $backend_upstream http://backend:8090;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Token do Keycloak (login/refresh) — backstop anti brute-force
        location = /realms/jetski-saas/protocol/openid-connect/token {
            limit_req zone=rl_token burst=100 nodelay;
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Keycloak - auth endpoints
        location /auth/ {
            set $keycloak_upstream http://keycloak:8080;
            rewrite ^/auth/(.*)$ /$1 break;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Keycloak - realms (necessário para OIDC)
        location /realms/ {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Keycloak - resources (JS, CSS, etc)
        location /resources/ {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
        }

        # Keycloak - admin console
        location /admin/ {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Grafana (observabilidade de prod) — upstream em variável: se o
        # container não existir (dev), o nginx sobe normal e a rota dá 502.
        location /grafana/ {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            # live tail / websockets do Grafana
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location = /grafana {
            return 301 /grafana/;
        }

        # MinIO (presigned URLs path-style: /{bucket}/{key}?X-Amz-...)
        # O host assinado é o público — preservamos o Host para a assinatura
        # validar no MinIO. Sem listagem: só objetos com assinatura válida.
        location /jetski-docs/ {
            set $minio_upstream http://minio:9000;
            proxy_pass $minio_upstream;
            proxy_set_header Host $host;
            # MinIO conta headers como metadata (limite 8KB) — os cookies de
            # sessão do portal+backoffice (mesmo host) estouram e viram
            # MetadataTooLarge no GET. A autz é a assinatura da URL: cookies
            # e Authorization não servem para nada aqui.
            proxy_set_header Cookie "";
            proxy_set_header Authorization "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            client_max_body_size 64m;
        }

        # Portal do cliente mudou para o subdomínio cliente.* (fase 1).
        # 301 preserva links antigos (e-mails /portal/ativar, PWAs, favoritos);
        # query string preservada ($is_args$args).
        location /portal {
            rewrite ^/portal(?:/(.*))?$ https://$portal_host/$1 permanent;
        }

        # Frontend (Next.js) - fallback para tudo mais
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support (para HMR do Next.js)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ================== Ferramentas internas (só PROD) ==================
    # Os containers (excalidash, drawio, kroki, oauth2-proxy) vivem num compose
    # separado no servidor; upstreams em variável fazem o nginx subir mesmo sem
    # eles (dev não resolve esses hosts). MANTIDOS NO REPO para o deploy não
    # apagá-los — lição do cutover da fase 1 (edições locais no servidor são
    # perdidas pelo git pull + recreate do nginx).
# Server block do ExcaliDash — em /home/ubuntu/jetski/infra/nginx/nginx.conf.
# Auth é nativa do ExcaliDash (OIDC/Keycloak); o frontend interno faz proxy
# de /api e WebSocket para o backend. Upstream em variável para o nginx
# subir mesmo com container ausente.
    server {
        listen 80;
        server_name excalidraw.meujet.com.br;
        client_max_body_size 64m;

        location / {
            set $excalidash_upstream http://excalidash-frontend:80;
            proxy_pass $excalidash_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }


# Server blocks drawio + kroki — em /home/ubuntu/jetski/infra/nginx/nginx.conf.
# Auth via tools-oauth2-proxy compartilhado (padrão auth_request); upstreams em
# variável para o nginx subir mesmo com container ausente.
    server {
        listen 80;
        server_name drawio.meujet.com.br;
        client_max_body_size 32m;

        location /oauth2/ {
            set $tools_oauth2 http://tools-oauth2-proxy:4180;
            proxy_pass $tools_oauth2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }
        location = /oauth2/auth {
            internal;
            set $tools_oauth2 http://tools-oauth2-proxy:4180;
            proxy_pass $tools_oauth2;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start?rd=https://$host$request_uri;
            set $drawio_upstream http://drawio:8080;
            proxy_pass $drawio_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 80;
        server_name kroki.meujet.com.br;
        client_max_body_size 16m;

        location /oauth2/ {
            set $tools_oauth2 http://tools-oauth2-proxy:4180;
            proxy_pass $tools_oauth2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
        }
        location = /oauth2/auth {
            internal;
            set $tools_oauth2 http://tools-oauth2-proxy:4180;
            proxy_pass $tools_oauth2;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }
        location = /playground {
            return 301 /playground/;
        }
        location /playground/ {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start?rd=https://$host$request_uri;
            set $playground_upstream http://kroki-playground:80;
            rewrite ^/playground/(.*)$ /$1 break;
            proxy_pass $playground_upstream;
            proxy_set_header Host $host;
        }
        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/start?rd=https://$host$request_uri;
            set $kroki_upstream http://kroki:8000;
            proxy_pass $kroki_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
