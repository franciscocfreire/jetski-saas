services:
  # ============ REVERSE PROXY ============
  nginx:
    image: nginx:alpine
    container_name: jetski-nginx
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - keycloak
    healthcheck:
      # 127.0.0.1 (não "localhost"): /etc/hosts resolve localhost p/ ::1 também e o
      # busybox wget tenta IPv6 primeiro, mas o nginx só faz `listen 80` (IPv4) →
      # "Connection refused" e container (unhealthy), apesar do tráfego real (IPv4) ok.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jetski-network

  # ============ DATABASE ============
  postgres:
    image: postgres:16
    container_name: jetski-postgres
    ports:
      - "0.0.0.0:5432:5432"
    environment:
      POSTGRES_USER: jetski
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: jetski_dev
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8 --auth-host=trust"
      POSTGRES_HOST_AUTH_METHOD: trust
    command: postgres -c listen_addresses='*'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      # -d é obrigatório: sem ele o pg_isready usa o nome do usuário como
      # database ("jetski", que não existe) e o Postgres loga
      # FATAL: database "jetski" does not exist a cada 10s
      test: ["CMD-SHELL", "pg_isready -U jetski -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jetski-network

  # ============ CACHE ============
  redis:
    image: redis:7-alpine
    container_name: jetski-redis
    ports:
      - "0.0.0.0:6379:6379"
    command: redis-server --appendonly yes --bind 0.0.0.0 --protected-mode no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jetski-network

  # ============ AUTH ============
  keycloak:
    # Imagem custom = oficial 26.4 + tema de login "meujet" (Keycloakify) em
    # /opt/keycloak/providers — ver infra/keycloak-theme/. Rebuild em dev:
    # ./rebuild.sh keycloak
    build:
      context: ./infra/keycloak-theme
    image: jetski-keycloak:latest
    container_name: jetski-keycloak
    command: start-dev --import-realm
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Mazuca@123

      # Database config
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/jetski_dev
      KC_DB_USERNAME: jetski
      KC_DB_PASSWORD: dev123
      KC_DB_SCHEMA: keycloak

      # Hostname config - importante para funcionar atrás do túnel (Cloudflare)
      # (KC_HOSTNAME_STRICT_HTTPS é opção do hostname v1, removida no KC 26 —
      # só gerava warning no boot; hostname dinâmico já cobre o caso do túnel)
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      # Substituição no import do realm (jetski-backoffice): resolve a URL pública
      # do túnel. Sem túnel, usa localhost. Mesmo mecanismo no prod (PUBLIC_URL=meujet).
      # Nomes sem prefixo KC_ (reservado p/ opções de config do Keycloak).
      BACKOFFICE_URL: ${APP_PUBLIC_URL:-${PUBLIC_URL:-http://localhost:3002}}
      BACKOFFICE_REDIRECT: ${APP_PUBLIC_URL:-${PUBLIC_URL:-http://localhost:3002}}/*
      # Portal no subdomínio próprio (fase 1) — cliente.pegaojet.com.br
      PORTAL_URL: ${PORTAL_PUBLIC_URL:-http://localhost:3003}
      PORTAL_REDIRECT: ${PORTAL_PUBLIC_URL:-http://localhost:3003}/*
      # Base pública dos links gerados pelo realm (e-mails de verificação etc.)
      # SSO_PUBLIC_URL (host dedicado sso.*) tem precedência quando definida.
      REALM_FRONTEND_URL: ${SSO_PUBLIC_URL:-${PUBLIC_URL:-http://localhost:8080}}
      # Login social Google (IdP broker no import do realm). Sem credenciais o
      # IdP nasce desabilitado — nenhum botão aparece na tela do Keycloak.
      GOOGLE_IDP_ENABLED: ${GOOGLE_IDP_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # Logging
      KC_LOG_LEVEL: INFO

      # Health
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Métricas de eventos de usuário (logins etc.) no /metrics da porta de
      # management (9000) — consumidas pelo Prometheus/Grafana.
      KC_EVENT_METRICS_USER_ENABLED: "true"
      # (erros de login aparecem como label error="..." na própria métrica de login)
      KC_EVENT_METRICS_USER_EVENTS: "login,logout,register,refresh_token"
      # client_id como label separa backoffice × portal (cardinalidade limitada: poucos clients)
      KC_EVENT_METRICS_USER_TAGS: "realm,clientId"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak-realm.json:/opt/keycloak/data/import/realm.json
    networks:
      - jetski-network

  # ============ POLICY ENGINE ============
  opa:
    image: openpolicyagent/opa:1.1.0
    container_name: jetski-opa
    ports:
      - "0.0.0.0:8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json-pretty"
      - "/policies"
    volumes:
      - ./policies:/policies
    networks:
      - jetski-network

  # ============ OBJECT STORAGE (S3) ============
  minio:
    image: minio/minio:latest
    container_name: jetski-minio
    command: server /data --console-address ":9001"
    ports:
      - "0.0.0.0:9000:9000"   # API S3
      - "0.0.0.0:9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - jetski-network
    restart: unless-stopped

  # ============ EMAIL CATCHER (DEV) ============
  # Mailpit: servidor SMTP local que captura todos os emails e mostra numa UI web.
  # SMTP em :1025 (o backend envia pra cá), UI em http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    container_name: jetski-mailpit
    ports:
      - "0.0.0.0:1025:1025"   # SMTP
      - "0.0.0.0:8025:8025"   # Web UI
    networks:
      - jetski-network
    restart: unless-stopped

  # ============ BACKEND ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jetski-backend
    ports:
      - "0.0.0.0:8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: dev

      # Database (jetski_app user without SUPERUSER/BYPASSRLS for RLS to work)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jetski_dev
      SPRING_DATASOURCE_USERNAME: jetski_app
      SPRING_DATASOURCE_PASSWORD: dev123

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # Keycloak OAuth2 — o decoder (SecurityConfig) valida o iss do token
      # contra este valor (+ variantes de dev). Com SSO_PUBLIC_URL definida
      # (host dedicado sso.*), os tokens nascem com esse iss e o issuer
      # configurado precisa acompanhar; o JWKS continua interno.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${SSO_PUBLIC_URL:-http://keycloak:8080}/realms/jetski-saas
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/jetski-saas/protocol/openid-connect/certs

      # Keycloak Admin
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: Mazuca@123
      # Client confidencial da validação de senha atual (perfil self-service);
      # default igual ao secret do realm dev (infra/keycloak-realm.json)
      KEYCLOAK_PASSWORD_CHECK_CLIENT_SECRET: ${KEYCLOAK_PASSWORD_CHECK_CLIENT_SECRET:-dev-password-check-secret}

      # OPA
      JETSKI_OPA_BASE_URL: http://opa:8181

      # Storage: MinIO (S3) — persistente, mesma stack
      STORAGE_TYPE: minio
      STORAGE_MINIO_ENDPOINT: http://minio:9000
      STORAGE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_MINIO_BUCKET: ${MINIO_BUCKET:-jetski-docs}
      # Host PÚBLICO para presigned URLs (assinatura inclui o host; o nginx
      # roteia /jetski-docs/ → minio). Sem túnel, usa a porta publicada.
      STORAGE_MINIO_PUBLIC_URL: ${STORAGE_MINIO_PUBLIC_URL:-http://localhost:9000}

      # Email: em dev envia para o Mailpit (UI em http://localhost:8025).
      # O host/port default (mailpit:1025) vêm do application-dev.yml.
      EMAIL_DEV_SMTP_ENABLED: "true"
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}

      # Chave-mestra p/ cifrar segredos em repouso (senha SMTP do tenant).
      JETSKI_SECRET_KEY: ${JETSKI_SECRET_KEY:-}
      JETSKI_SECRET_KEY_PREVIOUS: ${JETSKI_SECRET_KEY_PREVIOUS:-}

      # Frontend URL (for email links)
      JETSKI_FRONTEND_URL: ${JETSKI_FRONTEND_URL:-http://localhost:3001}

      # Fuso do negócio (validações de data/hora usam o relógio da JVM)
      TZ: America/Sao_Paulo

      # External URL (for ngrok or other tunnels - used for JWT issuer validation)
      JETSKI_EXTERNAL_URL: ${JETSKI_EXTERNAL_URL:-}
      # Base dos links do PORTAL nos e-mails (ativação de pré-conta etc.)
      JETSKI_PORTAL_URL: ${PORTAL_PUBLIC_URL:-}

      # Super admin de plataforma (emails separados por vírgula) — promovidos no boot.
      # Dev: admin@acme.com por padrão (mesmo super admin de prod).
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-admin@acme.com}

      # Logging
      LOGGING_LEVEL_ROOT: INFO
    volumes:
      # Storage local persistente (assinaturas/PDFs) — sobrevive a recreate
      - storage_data:/tmp/jetski-photos
    depends_on:
      - postgres
      - redis
      - keycloak
      - opa
      - minio
      - mailpit
    restart: unless-stopped
    networks:
      - jetski-network

  # ============ FRONTEND ============
  frontend:
    build:
      context: ./frontend/jetski-backoffice
      dockerfile: Dockerfile
    container_name: jetski-frontend
    ports:
      - "0.0.0.0:3001:3000"
    environment:
      # Public URLs (relative - work with any host/ngrok)
      NEXT_PUBLIC_API_URL: /api

      # NextAuth Configuration
      # Use ngrok URL for public access, or localhost for local dev
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: jetski-dev-secret-change-in-production-123456
      AUTH_TRUST_HOST: "true"
      # Enable non-secure cookies for E2E testing with Playwright
      # This disables __Secure- cookie prefix which Playwright can't handle
      NEXTAUTH_E2E_TESTING: "true"

      # Keycloak OAuth — client público + PKCE (NextAuth não usa secret)
      KEYCLOAK_CLIENT_ID: jetski-backoffice
      KEYCLOAK_CLIENT_SECRET: ""
      # For server-side calls - default to nginx for local, override for túnel
      # Local: http://nginx/realms/jetski-saas
      # Túnel: https://www.pegaojet.com.br/realms/jetski-saas
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://nginx/realms/jetski-saas}
    depends_on:
      - backend
      - nginx
    restart: unless-stopped
    networks:
      - jetski-network

  # ============ PORTAL DO CLIENTE ============
  # Servido sob {host}/portal pelo nginx (mesmo host do backoffice — sem CORS,
  # sem hostname novo no túnel). Client OIDC próprio: jetski-customer-portal.
  portal:
    build:
      context: ./frontend/portal-cliente
      dockerfile: Dockerfile
    container_name: jetski-portal
    ports:
      - "0.0.0.0:3003:3000"
    environment:
      # SSR (server components) chama o backend direto pela rede do docker
      API_INTERNAL_URL: http://backend:8090/api

      # NextAuth — no túnel: ${PORTAL_PUBLIC_URL} (rebuild.sh injeta; raiz do subdomínio)
      NEXTAUTH_URL: ${PORTAL_NEXTAUTH_URL:-http://localhost:3003}
      NEXTAUTH_SECRET: jetski-dev-secret-change-in-production-123456
      AUTH_TRUST_HOST: "true"

      # Keycloak OAuth — client público + PKCE (sem Membro; role CLIENTE)
      KEYCLOAK_CLIENT_ID: jetski-customer-portal
      KEYCLOAK_CLIENT_SECRET: ""
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://nginx/realms/jetski-saas}
    depends_on:
      - backend
      - nginx
    restart: unless-stopped
    networks:
      - jetski-network

volumes:
  storage_data:
  minio_data:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  keycloak_data:
    driver: local

networks:
  jetski-network:
    driver: bridge
